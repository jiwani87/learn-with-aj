<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Find the Missing Shape!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* Floating shapes background */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
        
        .game-container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .title {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #5a3e9a;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .score-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-size: 0.8rem;
            color: #8b5a2b;
            font-weight: 600;
        }
        
        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: #d35400;
        }
        
        .level-badge {
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
        }
        
        .pattern-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-weight: 800;
            color: #5a3e9a;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .pattern-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 20px;
            border: 3px dashed #d0d5ff;
        }
        
        .shape-box {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .shape-box.mystery {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            animation: pulse 1.5s infinite;
            font-size: 2rem;
            color: #5a3e9a;
            font-weight: 800;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .choices-section {
            margin-bottom: 20px;
        }
        
        .choices-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .choice-btn {
            width: 80px;
            height: 80px;
            font-size: 3rem;
            background: white;
            border: 4px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        
        .choice-btn:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .choice-btn:active {
            transform: translateY(0);
        }
        
        .choice-btn.correct {
            background: #00c853;
            border-color: #00c853;
            animation: celebrate 0.5s ease-out;
        }
        
        .choice-btn.wrong {
            background: #ff5252;
            border-color: #ff5252;
            animation: shake 0.5s;
        }
        
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(10deg); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .feedback {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .feedback.correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #1a5f2a;
        }
        
        .feedback.wrong {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #8b4513;
        }
        
        .feedback.waiting {
            background: #f0f0f0;
            color: #888;
        }
        
        .next-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
        
        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .hint-text {
            text-align: center;
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Timer styles */
        .timer-container {
            margin-bottom: 20px;
        }
        
        .timer-bar-bg {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .timer-bar {
            height: 100%;
            background: linear-gradient(90deg, #00c853, #69f0ae);
            border-radius: 15px;
            transition: width 0.1s linear;
            position: relative;
        }
        
        .timer-bar.warning {
            background: linear-gradient(90deg, #ff9800, #ffb74d);
        }
        
        .timer-bar.danger {
            background: linear-gradient(90deg, #f44336, #ff5252);
            animation: pulse-danger 0.5s infinite;
        }
        
        @keyframes pulse-danger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Fredoka One', cursive;
            font-size: 0.9rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            z-index: 2;
        }
        
        .timeout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .timeout-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            animation: bounceIn 0.5s;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .timeout-emoji {
            font-size: 80px;
            margin-bottom: 15px;
        }
        
        .timeout-title {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: #f44336;
            margin-bottom: 10px;
        }
        
        .timeout-answer {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .timeout-answer span {
            font-size: 2rem;
        }
        
        .continue-btn {
            padding: 15px 40px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .continue-btn:hover {
            transform: scale(1.05);
        }
        
        /* Stars animation for correct answers */
        .stars {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }
        
        .star {
            position: absolute;
            font-size: 2rem;
            animation: starFall 1s ease-out forwards;
        }
        
        @keyframes starFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(100px) rotate(360deg) scale(0); }
        }
        
        /* Game Over Screen */
        .game-over {
            text-align: center;
            padding: 30px;
        }
        
        .game-over-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: #5a3e9a;
            margin-bottom: 10px;
        }
        
        .final-score {
            font-size: 4rem;
            margin: 20px 0;
        }
        
        .final-score-label {
            color: #888;
            font-size: 1.2rem;
        }
        
        .final-score-value {
            font-family: 'Fredoka One', cursive;
            color: #ff6b6b;
        }
        
        .play-again-btn {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Floating background shapes -->
    <div class="bg-shapes">
        <div class="bg-shape" style="top: 10%; left: 10%; font-size: 100px;">🔴</div>
        <div class="bg-shape" style="top: 60%; left: 5%; font-size: 80px; animation-delay: -5s;">🔵</div>
        <div class="bg-shape" style="top: 20%; right: 10%; font-size: 90px; animation-delay: -10s;">🟡</div>
        <div class="bg-shape" style="top: 70%; right: 15%; font-size: 70px; animation-delay: -3s;">🟢</div>
        <div class="bg-shape" style="top: 40%; left: 50%; font-size: 60px; animation-delay: -7s;">⭐</div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="header">
            <h1 class="title">🎯 Find the Missing Shape!</h1>
            <p class="subtitle">Look at the pattern and pick the right shape</p>
        </div>
        
        <div class="score-bar">
            <div class="score-item">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <div class="level-badge" id="level">Level 1</div>
            </div>
            <div class="score-item">
                <div class="score-label">ROUND</div>
                <div class="score-value"><span id="round">1</span>/10</div>
            </div>
        </div>
        
        <div class="pattern-section">
            <div class="section-title">📋 The Pattern:</div>
            <div class="pattern-display" id="patternDisplay">
                <!-- Pattern shapes will appear here -->
            </div>
        </div>
        
        <div class="timer-container">
            <div class="timer-bar-bg">
                <div class="timer-bar" id="timerBar"></div>
                <div class="timer-text" id="timerText">10s</div>
            </div>
        </div>
        
        <div class="choices-section">
            <div class="section-title">🤔 Pick the missing shape:</div>
            <div class="choices-grid" id="choicesGrid">
                <!-- Choice buttons will appear here -->
            </div>
        </div>
        
        <div class="feedback waiting" id="feedback">
            👆 Tap a shape to answer!
        </div>
        
        <button class="next-btn" id="nextBtn" disabled>Next Pattern →</button>
        
        <p class="hint-text" id="hintText">💡 Tip: Look for what repeats!</p>
    </div>

    <div class="stars" id="stars"></div>

    <script>
        // Shape sets for different levels
        const shapeSets = [
            // Level 1: Simple 2-shape patterns
            ['🔴', '🔵'],
            ['🟡', '🟢'],
            ['⭐', '💜'],
            // Level 2: 3-shape patterns
            ['🔴', '🔵', '🟡'],
            ['🟢', '🟣', '🟠'],
            // Level 3: More complex
            ['⭐', '💎', '🔶', '💚'],
            ['🌙', '☀️', '⭐', '💫']
        ];
        
        let currentScore = 0;
        let currentRound = 1;
        let currentLevel = 1;
        let correctAnswer = '';
        let canAnswer = true;
        
        // Timer variables
        let timeLeft = 10;
        let timerInterval = null;
        const maxTime = 10;
        
        const maxRounds = 10;
        
        // DOM elements
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const roundEl = document.getElementById('round');
        const patternDisplay = document.getElementById('patternDisplay');
        const choicesGrid = document.getElementById('choicesGrid');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('nextBtn');
        const hintText = document.getElementById('hintText');
        const starsContainer = document.getElementById('stars');
        const gameContainer = document.getElementById('gameContainer');
        const timerBar = document.getElementById('timerBar');
        const timerText = document.getElementById('timerText');
        
        // Hints for different situations
        const correctMessages = [
            "🎉 Amazing! You got it!",
            "⭐ Super smart!",
            "🌟 Excellent work!",
            "💪 You're a pattern master!",
            "🏆 Perfect!",
            "🚀 Fantastic!"
        ];
        
        const wrongMessages = [
            "🤗 Good try! Look again...",
            "💭 Almost! Check the pattern...",
            "🔍 Look at what repeats!",
            "💪 You can do it! Try again!"
        ];
        
        const hints = [
            "💡 Tip: Look for what repeats!",
            "💡 Tip: Say the shapes out loud!",
            "💡 Tip: Find the pattern first!",
            "💡 Tip: What comes after?"
        ];
        
        function startTimer() {
            timeLeft = maxTime;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    timeOut();
                }
            }, 100);
        }
        
        function updateTimerDisplay() {
            const percent = (timeLeft / maxTime) * 100;
            timerBar.style.width = percent + '%';
            timerText.textContent = Math.ceil(timeLeft) + 's';
            
            // Change color based on time left
            timerBar.classList.remove('warning', 'danger');
            if (timeLeft <= 3) {
                timerBar.classList.add('danger');
            } else if (timeLeft <= 5) {
                timerBar.classList.add('warning');
            }
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function timeOut() {
            stopTimer();
            canAnswer = false;
            
            // Show timeout overlay
            const overlay = document.createElement('div');
            overlay.className = 'timeout-overlay';
            overlay.innerHTML = `
                <div class="timeout-box">
                    <div class="timeout-emoji">⏰</div>
                    <div class="timeout-title">Time's Up!</div>
                    <div class="timeout-answer">
                        The answer was: <span>${correctAnswer}</span>
                    </div>
                    <button class="continue-btn" onclick="closeTimeoutAndNext()">
                        Continue →
                    </button>
                </div>
            `;
            document.body.appendChild(overlay);
            
            // Update mystery box to show answer
            const mysteryBox = document.querySelector('.mystery');
            if (mysteryBox) {
                mysteryBox.textContent = correctAnswer;
                mysteryBox.classList.remove('mystery');
            }
        }
        
        function closeTimeoutAndNext() {
            const overlay = document.querySelector('.timeout-overlay');
            if (overlay) {
                overlay.remove();
            }
            nextRound();
        }
        
        function generatePattern() {
            // Stop any existing timer
            stopTimer();
            
            // Select shapes based on level
            let shapeSetIndex;
            if (currentLevel === 1) {
                shapeSetIndex = Math.floor(Math.random() * 3); // First 3 sets
            } else if (currentLevel === 2) {
                shapeSetIndex = 3 + Math.floor(Math.random() * 2); // Next 2 sets
            } else {
                shapeSetIndex = 5 + Math.floor(Math.random() * 2); // Last 2 sets
            }
            
            const shapes = shapeSets[shapeSetIndex];
            
            // Create a repeating pattern
            let pattern = [];
            const patternLength = currentLevel === 1 ? 2 : (currentLevel === 2 ? 3 : 4);
            
            // Generate base pattern
            let basePattern = [];
            for (let i = 0; i < patternLength; i++) {
                basePattern.push(shapes[i % shapes.length]);
            }
            
            // Repeat the pattern
            const totalLength = currentLevel === 1 ? 5 : (currentLevel === 2 ? 6 : 7);
            for (let i = 0; i < totalLength; i++) {
                pattern.push(basePattern[i % patternLength]);
            }
            
            // Choose a position to hide (not the first one)
            const mysteryIndex = 1 + Math.floor(Math.random() * (pattern.length - 1));
            correctAnswer = pattern[mysteryIndex];
            
            // Display pattern
            patternDisplay.innerHTML = '';
            pattern.forEach((shape, index) => {
                const box = document.createElement('div');
                box.className = 'shape-box';
                if (index === mysteryIndex) {
                    box.classList.add('mystery');
                    box.textContent = '?';
                } else {
                    box.textContent = shape;
                }
                patternDisplay.appendChild(box);
            });
            
            // Create choices (correct answer + distractors)
            let choices = [correctAnswer];
            const allShapes = ['🔴', '🔵', '🟡', '🟢', '🟣', '🟠', '⭐', '💎', '🔶', '💚', '💜', '🌙', '☀️', '💫'];
            
            while (choices.length < 4) {
                const randomShape = allShapes[Math.floor(Math.random() * allShapes.length)];
                if (!choices.includes(randomShape)) {
                    choices.push(randomShape);
                }
            }
            
            // Shuffle choices
            choices = choices.sort(() => Math.random() - 0.5);
            
            // Display choices
            choicesGrid.innerHTML = '';
            choices.forEach(shape => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = shape;
                btn.onclick = () => checkAnswer(btn, shape);
                choicesGrid.appendChild(btn);
            });
            
            // Reset state
            canAnswer = true;
            nextBtn.disabled = true;
            feedback.className = 'feedback waiting';
            feedback.textContent = '⏱️ Quick! Pick the right shape!';
            hintText.textContent = hints[Math.floor(Math.random() * hints.length)];
            
            // Start timer
            startTimer();
        }
        
        function checkAnswer(btn, shape) {
            if (!canAnswer) return;
            canAnswer = false;
            stopTimer();
            
            if (shape === correctAnswer) {
                // Correct! Bonus points for fast answer
                btn.classList.add('correct');
                feedback.className = 'feedback correct';
                
                // Bonus points based on time left
                const timeBonus = Math.floor(timeLeft);
                const points = (currentLevel * 10) + timeBonus;
                currentScore += points;
                
                feedback.textContent = correctMessages[Math.floor(Math.random() * correctMessages.length)] + ` (+${points} pts)`;
                scoreEl.textContent = currentScore;
                createStars();
                
                // Update mystery box to show answer
                document.querySelector('.mystery').textContent = correctAnswer;
                document.querySelector('.mystery').classList.remove('mystery');
            } else {
                // Wrong
                btn.classList.add('wrong');
                feedback.className = 'feedback wrong';
                feedback.textContent = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
                
                // Show correct answer after a moment
                setTimeout(() => {
                    document.querySelectorAll('.choice-btn').forEach(b => {
                        if (b.textContent === correctAnswer) {
                            b.classList.add('correct');
                        }
                    });
                    document.querySelector('.mystery').textContent = correctAnswer;
                    document.querySelector('.mystery').classList.remove('mystery');
                }, 500);
            }
            
            nextBtn.disabled = false;
        }
        
        function createStars() {
            for (let i = 0; i < 10; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.textContent = ['⭐', '🌟', '✨', '💫'][Math.floor(Math.random() * 4)];
                star.style.left = Math.random() * window.innerWidth + 'px';
                star.style.top = Math.random() * 200 + 'px';
                star.style.animationDelay = Math.random() * 0.5 + 's';
                starsContainer.appendChild(star);
                
                setTimeout(() => star.remove(), 1500);
            }
        }
        
        function nextRound() {
            currentRound++;
            
            if (currentRound > maxRounds) {
                showGameOver();
                return;
            }
            
            // Level up every 3 rounds
            if (currentRound === 4) {
                currentLevel = 2;
                levelEl.textContent = 'Level 2';
            } else if (currentRound === 7) {
                currentLevel = 3;
                levelEl.textContent = 'Level 3';
            }
            
            roundEl.textContent = currentRound;
            generatePattern();
        }
        
        function showGameOver() {
            stopTimer();
            
            let message = '';
            let emoji = '';
            
            if (currentScore >= 250) {
                message = "🏆 PATTERN MASTER! 🏆";
                emoji = "🌟";
            } else if (currentScore >= 150) {
                message = "⭐ Great Job! ⭐";
                emoji = "😊";
            } else {
                message = "👍 Good Try! 👍";
                emoji = "💪";
            }
            
            gameContainer.innerHTML = `
                <div class="game-over">
                    <div class="game-over-title">${message}</div>
                    <div class="final-score">
                        <div style="font-size: 80px; margin: 20px 0;">${emoji}</div>
                        <div class="final-score-label">Your Score</div>
                        <div class="final-score-value">${currentScore}</div>
                    </div>
                    <p style="color: #888; margin: 20px 0;">You completed all 10 patterns!</p>
                    <button class="next-btn play-again-btn" onclick="location.reload()">
                        🎮 Play Again!
                    </button>
                </div>
            `;
        }
        
        // Event listeners
        nextBtn.onclick = nextRound;
        
        // Start the game
        generatePattern();
    </script>
</body>
</html>
